name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libc6:i386 libcurl4:i386 libgtk-3-0:i386

      - name: Download Red binary
        run: |
          curl -sL -o red-view "https://static.red-lang.org/dl/linux/red-view?reload=true"
          chmod +x red-view

      - name: Run tests
        working-directory: tests
        run: |
          ../red-view run-all.red
