name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libc6:i386 libcurl4:i386 libgtk-3-0:i386

      - name: Run tests
        working-directory: tests
        run: |
          chmod +x ../red-cli ../redc
          ../red-cli ../tests/run-all.red

      - name: Validate DT-028 — .qvi compiles with red -c
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x redc
          ./redc -o /tmp/suma-test examples/suma-basica.qvi
          test -x /tmp/suma-test && echo "✓ DT-028 validated (binary produced)" || exit 1
