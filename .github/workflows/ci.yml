name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libc6:i386 libcurl4:i386 libgtk-3-0:i386 xvfb

      - name: Run tests
        working-directory: tests
        run: |
          chmod +x ../red-cli ../red-view ../redc
          xvfb-run ../red-view run-all.red
