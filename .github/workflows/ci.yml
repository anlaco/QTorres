name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libc6:i386 libcurl4:i386 libgtk-3-0:i386

      - name: Run tests
        working-directory: tests
        run: |
          chmod +x ../red-cli ../redc
          ../red-cli ../tests/run-all.red

      - name: Validate DT-028 — .qvi compiles with red -c
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            chmod +x redc
            ./redc -o /tmp/suma-test examples/suma-basica.qvi
            /tmp/suma-test A=5.0 B=3.0 | grep -q "8.0" && echo "✓ DT-028 validated" || exit 1
          else
            # Windows: use .exe extension
            chmod +x redc
            ./redc -o suma-test.exe examples/suma-basica.qvi
            ./suma-test.exe A=5.0 B=3.0 | grep -q "8.0" && echo "✓ DT-028 validated" || exit 1
          fi
